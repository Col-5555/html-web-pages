<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
  </head>
  <body>
    <section id="sign-in">
      <img src="assets/coding.png" alt="Logo image" />
      <h2>Login Now!</h2>
      <form action="/submit" method="post">
         <input
          type="email"
          id="email"
          name="email"
          placeholder="Email"
          required
        />
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Password"
          required
        />

        <!-- Submit -->
        <button type="submit">Sign Up</button>
      </form>
      New to CodeCLA? <a href="signup.html">Sign up</a>
    </section>
  </body>
</html>
