<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Sign In</title>
  </head>
  <body>
    <section id="sign-in">
      <div class="signin-left">
        <img src="assets/coding.png" alt="Coder illustration" />
      </div>
      <div class="signin-right">
        <div class="signin-card">
          <h2>Join Coders Now!</h2>
          <form action="/submit" method="post">
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Email"
              required
            />
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Password"
              required
            />
            <button type="submit">Login</button>
          </form>
          <p class="signup-footer">
            New to CodeCLA. <a href="signup.html">Signup</a>
          </p>
        </div>
      </div>
    </section>
  </body>
</html>
