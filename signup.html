<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
  </head>
  <body>
    <section id="sign-up">
      <img src="assets/coding.png" alt="Logo image" />
      <h2>Join Coders Now!</h2>
      <form action="/submit" method="post">
        <input
          type="text"
          id="first-name"
          name="first-name"
          placeholder="First Name"
          required
        />

        <input
          type="text"
          id="last-name"
          name="last-name"
          placeholder="Last Name"
          required
        />
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Email"
          required
        />
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Password"
          required
        />

        <!-- Submit -->
        <button type="submit">Sign Up</button>
      </form>
      Already have an account? <a href="signin.html">Login</a>
    </section>
  </body>
</html>
