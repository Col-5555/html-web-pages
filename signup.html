<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Sign Up</title>
  </head>
  <body>
    <section id="sign-in">
      <div class="signin-left">
        <img src="assets/coding.png" alt="Coder illustration" />
      </div>
      <div class="signin-right">
        <div class="signin-card">
          <h2>Join Coders Now!</h2>
          <form action="/submit" method="post">
            <input
              type="text"
              id="first-name"
              name="first-name"
              placeholder="First Name"
              required
            />
            <input
              type="text"
              id="last-name"
              name="last-name"
              placeholder="Last Name"
              required
            />
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Email"
              required
            />
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Password"
              required
            />
            <button type="submit">Sign Up</button>
          </form>
          <p class="signup-footer">Already have an account?. <a href="signin.html">Login</a></p>
        </div>
      </div>
    </section>
  </body>
</html>
